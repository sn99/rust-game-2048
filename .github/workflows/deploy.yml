name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-targets: true
          prefix-key: rust-game-2048

      - name: Test (native)
        run: cargo test

      - name: Check wasm target
        run: cargo check --target wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          # Pin for reproducible Pages builds (avoid "latest" drift).
          version: v0.21.14

      - name: Cache Trunk
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-0.21.14-${{ hashFiles('Trunk.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-trunk-0.21.14-

      - name: Build
        run: |
          mkdir -p dist
          trunk build --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
